# 电商商品检查配置文件
# 全局配置（所有店铺通用）
global:
  title_max_length: 60
  price_min: 0.1
  price_max: 999999
  detail_images_min_count: 3
  image_min_width: 800
  image_min_height: 800
  image_max_size_mb: 5.0
  sensitive_words:
    - 最
    - 第一
    - 绝对
    - 国家级
    - 最高级
    - 全网最低
    - 秒杀
    - 爆款
    - 限量
    - 独家

# 店铺级配置（覆盖全局）
shops:
  旗舰店:
    title_max_length: 80
    sensitive_words:
      - 官方禁用词1
      - 官方禁用词2

  专营店:
    title_max_length: 50
    price_min: 1.0
    price_max: 99999
    detail_images_min_count: 5
    image_min_width: 1000
    image_min_height: 1000
